name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea in detail.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Is it related to a specific API endpoint or use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like the feature to work, including any API design ideas.
      placeholder: |
        ```csharp
        // Example of how the feature might be used
        await samsara.Vehicles.GetStatsHistoryAsync(...);
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there any alternative approaches or workarounds you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional context, links to Samsara API docs, or screenshots.
